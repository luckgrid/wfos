# sops creation rules — the `files` vault (git-checked config, values encrypted).
#
# sops uses these rules to pick a recipient when encrypting a matching file. `age` is the
# backend (X25519, no daemon). Only VALUES are encrypted; keys and structure stay readable so
# diffs remain mergeable.
#
# DEFERRED: the age recipient below is a placeholder. Provision a real recipient (a human step),
# replace it, then encrypt per ../secrets/README.md. No real key material is committed here.
creation_rules:
  - path_regex: \.enc\.(ya?ml|json|env)$
    age: "age1placeholderxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

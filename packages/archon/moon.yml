layer: configuration
language: bash

project:
  name: "archon"
  description: "Metadata plane — descriptors, schemas, policies, and the generated registry."

# Build-time metadata tasks. Archon still exposes no end-user runtime CLI; `validate` is
# the registry gate and `sync` regenerates the registry from descriptors + policies + the
# Dust tools registry. Both are read-only over sources (agent-safe) and uncached (they read
# host-specific inputs and emit generated output).
tasks:
  validate:
    command: "bin/archon"
    args: ["validate"]
    options:
      cache: false

  sync:
    command: "bin/archon"
    args: ["sync"]
    options:
      cache: false

  skills-map:
    command: "bin/archon"
    args: ["skills", "map"]
    options:
      cache: false

  scan:
    command: "bin/archon"
    args: ["scan"]
    options:
      cache: false

  secrets-scan:
    command: "bin/archon"
    args: ["secrets-scan", "detect"]
    options:
      cache: false

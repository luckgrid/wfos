# Archon descriptor — Dust native substrate (WfOS Level 0).
id = "dust"
kind = "native-substrate"
archetype = "native-substrate"
brand = "dust"
version = "0.1.0"
summary = "Global low-level Unix/Rust tool substrate for devs and agents."

[paths]
# Relative to ~/Workstreams/ by convention — adjust if your tree differs.
package = "Build/src/workspaces/wfos/packages/dust"
manifest = "Build/src/workspaces/wfos/packages/dust/manifest/dust.tools.toml"
registry = "Build/src/workspaces/wfos/packages/archon/registry/tools.json"
policy = "Build/src/workspaces/wfos/packages/archon/policies/dust.agent.policy.toml"
schema = "Build/src/workspaces/wfos/packages/archon/schemas/dust.tools.schema.json"
note = "Paths are suggested layout hints for Archon routing, not hard requirements."

[cli]
entry = "dust"
commands = ["doctor", "list", "env", "bootstrap", "version", "help"]

[install]
strategy = "global"
package_managers = ["homebrew", "mise"]
shell = "zsh"
note = "Binaries install globally; only manifest, scripts, configs, and metadata live in-repo."

[modules]
ids = ["shell", "git", "nav", "system", "session", "secrets", "tools", "dotfiles", "js", "rust", "ether", "logs"]

[runtime_manager]
default = "mise"
present = "proto"
note = "mise is the Dust default; proto retained and left intact on this machine."

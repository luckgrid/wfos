# Archon policy — agent bin/archive mutation rails (WfOS Level 0 §13.4).
# Report-only inventory is agent-safe; cleanup mutation is human-only. Orthogonal to
# agent-git (git command tiers). Runtime interception deferred to Kraken — same boundary
# as agent-git and secret CLIs on PATH. Script-level belt-and-suspenders: archon-bin-cleanup
# refuses archive/delete-approved under DUST_AGENT=1.
id = "agent-bin"
applies_to = "agent"
version = "0.1.0"

[allow]
commands = ["archon bin-report", "archon bin-cleanup --mode report-only", "du", "fd", "stat"]

[gate]
commands = ["archon bin-cleanup --mode dry-run"]

[block]
commands = ["archon bin-cleanup --mode archive", "archon bin-cleanup --mode delete-approved", "rm", "mv", "git clean"]
paths = ["bin/", "lib/"]

[rationale]
text = "Bin is disposable but traceable; lib is reviewable. Agents may inventory and dry-run-plan cleanup, but must not rm/mv/git-clean bin or lib without exact human-approved scope. Archive and delete-approved are human-only."

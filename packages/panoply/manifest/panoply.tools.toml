# Panoply tool library — single source of truth.
#
# Format: flat array-of-tables ([[tool]]) for dependency-free shell parsing.
# Derived artifacts: Brewfile, ontarch/registry/tools.json (doctor), shell activations.
#
# Fields:
#   module        Panoply module (shell|git|nav|session|secrets|tools|js|rust|wisp|logs)
#   id            stable tool id
#   default       true if it is the module default (vs a swappable alternative)
#   brew          Homebrew formula; empty string = detect-only (no auto-install)
#   detect        command checked on PATH for "installed?"
#   agent_safe    true if agents may invoke this tool directly
#   alternatives  comma-separated alternative ids (informational)
#   purpose       one-line description

version = "0.1.0"

# ── shell ──────────────────────────────────────────────────────────────────
[[tool]]
module = "shell"
id = "starship"
default = true
brew = "starship"
detect = "starship"
agent_safe = true
alternatives = ""
purpose = "cross-shell prompt context"

[[tool]]
module = "shell"
id = "shellcheck"
default = true
brew = "shellcheck"
detect = "shellcheck"
agent_safe = true
alternatives = ""
purpose = "shell script linting"

[[tool]]
module = "shell"
id = "zsh-autosuggestions"
default = true
brew = "zsh-autosuggestions"
detect = "share/zsh-autosuggestions/zsh-autosuggestions.zsh"
agent_safe = true
alternatives = ""
purpose = "fish-like async command suggestions from history (sourced plugin)"

[[tool]]

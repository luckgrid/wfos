id = "zsh-autocomplete"
default = false
brew = "zsh-autocomplete"
detect = "share/zsh-autocomplete/zsh-autocomplete.plugin.zsh"
agent_safe = true
alternatives = ""
purpose = "real-time menu completion (sourced plugin; can conflict — optional)"


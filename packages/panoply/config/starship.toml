# Panoply starship prompt. Linked to ~/.config/starship.toml by `panoply bootstrap`.
add_newline = true
command_timeout = 1000

format = "$directory$git_branch$git_status$nodejs$rust$python$cmd_duration$character"

[character]
success_symbol = "[›](bold green)"
error_symbol = "[›](bold red)"

[directory]
truncation_length = 3
truncate_to_repo = true

[git_branch]
symbol = " "

[git_status]
disabled = false

[cmd_duration]
min_time = 2000
format = "[$duration]($style) "

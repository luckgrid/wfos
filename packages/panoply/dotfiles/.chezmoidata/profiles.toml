# Profile classes. chezmoi auto-loads .chezmoidata/*.toml into template data,
# so these become the `.profiles` namespace.
#
# Each profile declares:
#   description     one line
#   use_case        where it runs
#   renders         config-target categories it RENDERS (see category map below)
#   excludes        categories it EXCLUDES (enforced by .chezmoiignore.tmpl)
#   gui             may render GUI-app configs (zed, etc.)
#   secrets         may reference secret-bearing files (private_dot_config/; secrets module)
#   remote_writes   may render push/credential convenience (git remote writes)
#   rtk             route command output through RTK by default (recommended-default compressor;
#                   the layer is still a no-op unless rtk is installed — overridable per profile)
#
# Category → target map (what each category covers):
#   shell        -> ~/.zshrc
#   git          -> ~/.gitconfig
#   prompt       -> ~/.config/starship.toml
#   session      -> ~/.config/tmux/, ~/.tmux.conf
#   runtime      -> ~/.config/mise/
#   editor-gui   -> ~/.config/zed/        (GUI app config)
#   agent-tools  -> ~/.config/opencode/   (agent CLI/tool config)
#   secrets      -> ~/.config/wfos-secrets/** (private; sops/pass references only)

[profiles.local-macos-full]
description = "main workstation — full shell, GUI editor configs, AI tools"
use_case = "primary developer macOS machine"
renders = ["shell", "git", "prompt", "session", "runtime", "editor-gui", "agent-tools", "secrets"]
excludes = []
gui = true
secrets = true
remote_writes = true
rtk = true

[profiles.headless-dev]
description = "remote server / VM — no GUI config, limited secrets, minimal prompt"
use_case = "headless dev box, container, or cloud runtime"
renders = ["shell", "git", "prompt", "session", "runtime"]
excludes = ["editor-gui", "agent-tools", "secrets"]
gui = false
secrets = false
remote_writes = true
rtk = true

[profiles.agent-safe]
description = "agent execution — narrow env, no secret read, no remote writes"
use_case = "agent sessions (PANOPLY_AGENT=1)"
renders = ["shell", "git"]
excludes = ["prompt", "session", "runtime", "editor-gui", "agent-tools", "secrets"]
gui = false
secrets = false
remote_writes = false
rtk = true

[profiles.workstreams-maintainer]
description = "toolkit maintenance — full docs/tools access, gated cleanup"
use_case = "maintaining the Workstreams toolkit itself"
renders = ["shell", "git", "prompt", "session", "runtime", "editor-gui", "agent-tools", "secrets"]
excludes = []
gui = true
secrets = true
remote_writes = true
rtk = true

# Ontarch policy — Panoply agent rails (WfOS Level 0 §13).
# Enforced by lib/common.sh via the PANOPLY_AGENT environment variable.
id = "panoply.agent"
applies_to = "panoply"
version = "0.1.0"

[agent]
# When PANOPLY_AGENT=1, only read-only commands run; mutating ones are blocked (exit 13).
env_flag = "PANOPLY_AGENT"
allow = ["doctor", "list", "gen", "env", "version", "help"]
block = ["bootstrap"]

[gates]
# Capabilities agents must never exercise directly at Level 0.
no_global_install = true        # no brew/mise installs
no_secret_read = true           # no pass/age/sops invocation
no_shell_mutation = true        # no edits to ~/.zshrc or ~/.config symlinks

[secrets]
# Hard block for the no_secret_read gate. The manifest `agent_safe = false` flags on these
# tools are the source of truth; this list is the authoritative policy statement of intent.
# Enforced by lib/common.sh `panoply_require_secret_access` (exit 13) and asserted by `panoply doctor`.
block_tools = ["pass", "age", "sops"]
rationale = "Reading a secret would place secret material into agent context; it is structurally excluded."

[rationale]
text = "Detection and reporting are safe for agents; installing software, reading secrets, and editing dotfiles require a human."

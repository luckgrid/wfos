# Ontarch policy — agent git command rails (agent-rails).
# The authoritative allow / gate / block tiers for agent git usage. Reading and inspecting are
# safe; committing/pulling/branching are gated (human-initiated or elevated); pushing, history
# rewrites, and destructive cleanups are blocked by default. Remote writes require elevated
# policy plus human approval. Superset of no-agent-git-push (which stays the publish-specific
# statement). Runtime interception is deferred to Takogami, same boundary as no-agent-git-push.
id = "agent-git"
applies_to = "agent"
version = "0.1.0"

[allow]
commands = ["git status", "git diff", "git log", "git branch --show-current", "git worktree list"]

[gate]
commands = ["git commit", "git pull", "git checkout -b"]

[block]
commands = ["git push", "git push --force", "git push --force-with-lease", "git reset --hard", "git clean"]
actions = ["delete untracked files"]

[remote]
writes = "elevated"

[rationale]
text = "Inspection is free; mutation is gated; publishing and destructive operations are blocked. Push and history rewrites mutate shared state and can destroy work, so they require a human. Remote writes require elevated policy and human approval."

# Ontarch policy — agent bin/archive mutation rails (agent-rails / bin-archive).
# Report-only inventory is agent-safe; cleanup mutation is human-only. Orthogonal to
# agent-git (git command tiers). Runtime interception deferred to Takogami — same boundary
# as agent-git and secret CLIs on PATH. Script-level belt-and-suspenders: ontarch-bin-cleanup
# refuses archive/delete-approved under PANOPLY_AGENT=1.
id = "agent-bin"
applies_to = "agent"
version = "0.1.0"

[allow]
commands = ["ontarch bin-report", "ontarch bin-cleanup --mode report-only", "du", "fd", "stat"]

[gate]
commands = ["ontarch bin-cleanup --mode dry-run"]

[block]
commands = ["ontarch bin-cleanup --mode archive", "ontarch bin-cleanup --mode delete-approved", "rm", "mv", "git clean"]
paths = ["bin/", "lib/"]

[rationale]
text = "Bin is disposable but traceable; lib is reviewable. Agents may inventory and dry-run-plan cleanup, but must not rm/mv/git-clean bin or lib without exact human-approved scope. Archive and delete-approved are human-only."

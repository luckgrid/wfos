[package]
name = "takogami"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
description = "WfOS runtime controller — discovery, routing, policy, and sessions"
readme = "README.md"

[[bin]]
name = "takogami"
path = "src/main.rs"

[lib]
name = "takogami"
path = "src/lib.rs"

[dependencies]
async-trait = "0.1"
clap = { version = "4.5", features = ["derive"] }
miette = { version = "7.6", features = ["fancy"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sha2 = "0.10"
starbase = { version = "0.13", features = ["miette", "tracing"] }
thiserror = "2.0"
tokio = { version = "1.48", features = ["rt-multi-thread", "macros"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[dev-dependencies]
jsonschema = "0.28"
serde_json = "1.0"
tempfile = "3.24"
